url: https://apsmunro.github.io/r4clinstats/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: Learn R for clinical work, by doing it
  description: >
    A gentle, interactive R course for clinicians and clinical researchers.
    Write real code against synthetic clinical data and get instant, kind feedback.

navbar:
  structure:
    left:  [getstarted, tryit, troubleshooting, reference]
    right: [search, github]
  components:
    getstarted:
      text: Get started
      href: articles/getting-started.html
    troubleshooting:
      text: Troubleshooting
      href: articles/troubleshooting.html
    tryit:
      text: Try it in your browser
      href: articles/try-in-your-browser.html
    reference:
      text: "Functions & data"
      href: reference/index.html

reference:
- title: Take the course
  desc: The functions a learner uses.
  contents:
  - learn
  - check_setup
  - use_local_library
  - start_report
- title: Datasets
  desc: Synthetic, reproducible clinical data used throughout the lessons.
  contents:
  - patients
  - labs
  - outcomes
  - linelist
